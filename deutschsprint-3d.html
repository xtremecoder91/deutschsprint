<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DeutschSprint 3D</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  :root { --ink:#1A1614; --accent:#FF5C39; --green:#2D8659; --gold:#E8B931; }
  html, body { width:100%; height:100%; overflow:hidden; background:#0a0a0a; font-family:'Inter',sans-serif; color:white; }
  #scene-canvas { position:fixed; inset:0; width:100vw; height:100vh; display:block; touch-action:none; }
  
  .hud-top { position:fixed; top:0; left:0; right:0; padding:14px 18px; display:flex; justify-content:space-between; align-items:center; gap:12px; z-index:10; pointer-events:none; }
  .hud-top > * { pointer-events:auto; }
  .quit-btn { width:40px; height:40px; border-radius:50%; background:rgba(0,0,0,0.5); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.15); color:white; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
  .quit-btn:hover { background:rgba(0,0,0,0.7); }
  .scene-title { background:rgba(0,0,0,0.5); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.15); border-radius:100px; padding:8px 18px; font-family:'Fraunces',serif; font-weight:700; font-size:15px; }
  .stats-pills { display:flex; gap:8px; }
  .stat-pill { background:rgba(0,0,0,0.5); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.15); border-radius:100px; padding:6px 12px; font-size:13px; font-weight:600; display:flex; align-items:center; gap:5px; }
  
  .quest-card { position:fixed; top:70px; left:18px; right:18px; max-width:360px; margin:0 auto; background:rgba(0,0,0,0.65); backdrop-filter:blur(14px); border:1px solid rgba(255,255,255,0.15); border-radius:14px; padding:14px 16px; z-index:9; animation:slideDown 0.4s ease; }
  @keyframes slideDown { from{transform:translateY(-20px);opacity:0;} to{transform:translateY(0);opacity:1;} }
  .quest-label { font-size:10px; text-transform:uppercase; letter-spacing:0.1em; color:var(--gold); font-weight:700; margin-bottom:4px; }
  .quest-text { font-size:14px; font-weight:500; line-height:1.4; }
  .quest-progress { margin-top:8px; display:flex; align-items:center; gap:6px; font-size:12px; opacity:0.8; }
  .quest-checks { display:flex; gap:4px; }
  .quest-check { width:12px; height:12px; border-radius:50%; border:1.5px solid rgba(255,255,255,0.3); }
  .quest-check.done { background:var(--green); border-color:var(--green); }
  
  .interact-prompt { position:fixed; bottom:180px; left:50%; transform:translateX(-50%) translateY(20px); background:rgba(0,0,0,0.75); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.2); border-radius:100px; padding:10px 18px; font-size:14px; font-weight:600; z-index:8; opacity:0; transition:all 0.25s; pointer-events:none; display:flex; align-items:center; gap:8px; }
  .interact-prompt.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .interact-key { background:rgba(255,255,255,0.2); padding:2px 8px; border-radius:6px; font-size:11px; font-weight:700; }
  
  .joystick-zone { position:fixed; bottom:30px; left:30px; width:130px; height:130px; z-index:7; display:none; }
  .joystick-zone.show { display:block; }
  .joystick-base { position:absolute; inset:0; background:rgba(255,255,255,0.1); backdrop-filter:blur(10px); border:2px solid rgba(255,255,255,0.2); border-radius:50%; }
  .joystick-stick { position:absolute; width:60px; height:60px; top:35px; left:35px; background:rgba(255,255,255,0.4); backdrop-filter:blur(10px); border:2px solid rgba(255,255,255,0.5); border-radius:50%; transition:transform 0.1s; }
  .action-btn { position:fixed; bottom:50px; right:30px; width:80px; height:80px; background:var(--accent); border:4px solid rgba(255,255,255,0.3); border-radius:50%; color:white; font-size:30px; font-weight:700; cursor:pointer; z-index:7; display:none; box-shadow:0 8px 24px rgba(255,92,57,0.4); align-items:center; justify-content:center; transition:all 0.2s; }
  .action-btn.show { display:flex; }
  .action-btn:active { transform:scale(0.92); }
  .action-btn.disabled { background:rgba(0,0,0,0.4); border-color:rgba(255,255,255,0.1); }
  
  /* DeutschSprint logo animations */
  .ds-logo-mark { width:80px; height:80px; margin-bottom:18px; }
  .ds-logo-mark svg { width:100%; height:100%; }
  .ds-trail { transform-origin: 0 50%; animation: dsTrail 2.4s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
  .ds-chevron { animation: dsChevron 2.4s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
  .ds-flag-stripe { animation: dsFlag 2.4s ease-in-out infinite; }
  @keyframes dsTrail { 0%,100%{transform:scaleX(0.6); opacity:0.4;} 50%{transform:scaleX(1); opacity:1;} }
  @keyframes dsChevron { 0%,100%{transform:translateX(0);} 50%{transform:translateX(2px);} }
  @keyframes dsFlag { 0%,100%{opacity:0.7;} 50%{opacity:1;} }
  
  .loading { position:fixed; inset:0; background:linear-gradient(135deg,#1A1614 0%,#2D2520 100%); z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; transition:opacity 0.5s; }
  .loading.hidden { opacity:0; pointer-events:none; }
  .loading-logo { font-family:'Fraunces',serif; font-size:42px; font-weight:900; letter-spacing:-0.03em; margin-bottom:8px; }
  .loading-logo em { font-style:italic; color:var(--accent); }
  .loading-sub { font-size:14px; opacity:0.6; margin-bottom:32px; }
  .loading-bar { width:240px; height:4px; background:rgba(255,255,255,0.1); border-radius:100px; overflow:hidden; }
  .loading-bar-fill { height:100%; background:var(--accent); border-radius:100px; width:0%; transition:width 0.3s; }
  .loading-status { margin-top:16px; font-size:12px; opacity:0.5; text-transform:uppercase; letter-spacing:0.08em; font-weight:600; }
  
  .lesson-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(20px); z-index:50; display:none; align-items:center; justify-content:center; padding:20px; animation:fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
  .lesson-overlay.active { display:flex; }
  .lesson-card { background:white; color:var(--ink); border-radius:24px; padding:28px; max-width:460px; width:100%; text-align:center; animation:cardIn 0.4s cubic-bezier(0.4,0,0.2,1); }
  @keyframes cardIn { from{transform:scale(0.85) translateY(20px);opacity:0;} to{transform:scale(1) translateY(0);opacity:1;} }
  .lesson-icon { width:88px; height:88px; margin:0 auto 16px; background:linear-gradient(135deg,#FFE8E0 0%,#FED7AA 100%); border-radius:22px; display:flex; align-items:center; justify-content:center; font-size:48px; }
  .lesson-de { font-family:'Fraunces',serif; font-size:36px; font-weight:800; letter-spacing:-0.02em; margin-bottom:4px; line-height:1.1; }
  .lesson-en { font-size:16px; color:#6B6560; margin-bottom:16px; }
  .lesson-listen { background:var(--accent); color:white; border:none; padding:12px 22px; border-radius:100px; font-family:'Inter',sans-serif; font-size:14px; font-weight:600; cursor:pointer; margin-bottom:20px; display:inline-flex; align-items:center; gap:8px; transition:transform 0.2s; }
  .lesson-listen:hover { transform:scale(1.05); }
  .lesson-question { font-size:14px; color:#6B6560; margin-bottom:12px; font-weight:500; }
  .lesson-options { display:flex; flex-direction:column; gap:8px; margin-bottom:16px; }
  .lesson-option { background:white; border:2px solid #EDE8E1; border-radius:12px; padding:12px 16px; font-family:'Inter',sans-serif; font-size:14px; font-weight:500; color:var(--ink); cursor:pointer; transition:all 0.2s; text-align:left; }
  .lesson-option:hover { border-color:var(--ink); }
  .lesson-option.correct { background:#D9F0E3; border-color:var(--green); color:var(--green); }
  .lesson-option.incorrect { background:#FFE0E3; border-color:#E63946; color:#E63946; }
  .lesson-close { background:var(--ink); color:white; border:none; padding:12px 28px; border-radius:12px; font-family:'Inter',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:all 0.2s; width:100%; }
  
  .quest-complete-modal { position:fixed; inset:0; background:rgba(0,0,0,0.85); backdrop-filter:blur(20px); z-index:60; display:none; align-items:center; justify-content:center; padding:20px; }
  .quest-complete-modal.active { display:flex; animation:fadeIn 0.4s; }
  .quest-complete-card { background:white; color:var(--ink); border-radius:24px; padding:36px 28px; max-width:420px; width:100%; text-align:center; }
  .quest-complete-icon { font-size:72px; margin-bottom:16px; animation:bounce 0.6s ease; }
  @keyframes bounce { 0%{transform:scale(0);} 60%{transform:scale(1.15);} 100%{transform:scale(1);} }
  .quest-complete-title { font-family:'Fraunces',serif; font-size:32px; font-weight:900; letter-spacing:-0.03em; margin-bottom:8px; }
  .quest-complete-sub { font-size:15px; color:#6B6560; margin-bottom:24px; line-height:1.5; }
  .quest-complete-stats { display:flex; gap:12px; margin-bottom:24px; }
  .quest-complete-stat { flex:1; background:#FAF7F2; border-radius:12px; padding:14px 8px; }
  .quest-complete-stat-value { font-family:'Fraunces',serif; font-size:24px; font-weight:800; color:var(--accent); }
  .quest-complete-stat-label { font-size:10px; color:#6B6560; text-transform:uppercase; letter-spacing:0.08em; font-weight:600; margin-top:2px; }
  
  .hint-banner { position:fixed; top:70px; left:50%; transform:translateX(-50%) translateY(-30px); background:rgba(0,0,0,0.85); backdrop-filter:blur(10px); color:white; padding:10px 18px; border-radius:100px; font-size:13px; font-weight:500; z-index:11; opacity:0; transition:all 0.3s; white-space:nowrap; }
  .hint-banner.show { opacity:1; transform:translateX(-50%) translateY(0); }
  
  @media (min-width: 768px) {
    .joystick-zone, .action-btn { display:none !important; }
  }
</style>
</head>
<body>

<canvas id="scene-canvas"></canvas>

<div class="loading" id="loading">
  <div class="ds-logo-mark">
    <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="dsBg3d" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#1A1614"/>
          <stop offset="100%" stop-color="#2A2420"/>
        </linearGradient>
      </defs>
      <rect x="0" y="0" width="40" height="40" rx="9" fill="#FAF7F2"/>
      <g class="ds-flag-stripe">
        <rect x="29" y="5" width="6" height="1.6" rx="0.6" fill="#000000"/>
        <rect x="29" y="7" width="6" height="1.6" rx="0.6" fill="#dd0000"/>
        <rect x="29" y="9" width="6" height="1.6" rx="0.6" fill="#FFCE00"/>
      </g>
      <rect class="ds-trail" x="6" y="19" width="14" height="2" rx="1" fill="#FF5C39"/>
      <path d="M 11 11 L 11 29 L 18 29 Q 25 29 25 20 Q 25 11 18 11 Z" fill="#1A1614"/>
      <path d="M 14 14 L 14 26 L 17.5 26 Q 22 26 22 20 Q 22 14 17.5 14 Z" fill="#FAF7F2"/>
      <path class="ds-chevron" d="M 27 16 L 32 20 L 27 24" stroke="#FF5C39" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
  </div>
  <div class="loading-logo">Deutsch<em>Sprint</em></div>
  <div style="font-size:9px; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:0.2em; font-weight:600; margin-top:-4px; margin-bottom:14px;">agprods</div>
  <div class="loading-sub" id="loadingSub">Loading scene...</div>
  <div class="loading-bar"><div class="loading-bar-fill" id="loadingBar"></div></div>
  <div class="loading-status" id="loadingStatus">Initializing</div>
</div>

<div class="hud-top">
  <button class="quit-btn" onclick="quitGame()">✕</button>
  <div class="scene-title" id="sceneTitle">Loading...</div>
  <div class="stats-pills">
    <div class="stat-pill" style="color:var(--gold);">⚡ <span id="hudXP">0</span></div>
  </div>
</div>

<div class="quest-card" id="questCard" style="display:none;">
  <div class="quest-label">Quest</div>
  <div class="quest-text" id="questText"></div>
  <div class="quest-progress">
    <div class="quest-checks" id="questChecks"></div>
    <span><span id="questDone">0</span>/<span id="questTotal">5</span></span>
  </div>
</div>

<div class="hint-banner" id="hintBanner"></div>

<div class="interact-prompt" id="interactPrompt">
  <span class="interact-key">E</span>
  <span id="interactText">Examine</span>
</div>

<div class="joystick-zone" id="joystickZone">
  <div class="joystick-base"></div>
  <div class="joystick-stick" id="joystickStick"></div>
</div>
<button class="action-btn disabled" id="actionBtn">E</button>

<div class="lesson-overlay" id="lessonOverlay">
  <div class="lesson-card" id="lessonCard"></div>
</div>

<div class="quest-complete-modal" id="questCompleteModal">
  <div class="quest-complete-card">
    <div class="quest-complete-icon">🎉</div>
    <div class="quest-complete-title" id="completeTitle">Ausgezeichnet!</div>
    <div class="quest-complete-sub" id="completeSub"></div>
    <div class="quest-complete-stats">
      <div class="quest-complete-stat"><div class="quest-complete-stat-value">+50</div><div class="quest-complete-stat-label">XP</div></div>
      <div class="quest-complete-stat"><div class="quest-complete-stat-value" id="completeWords">5</div><div class="quest-complete-stat-label">Words</div></div>
      <div class="quest-complete-stat"><div class="quest-complete-stat-value">100%</div><div class="quest-complete-stat-label">Complete</div></div>
    </div>
    <button class="lesson-close" onclick="quitGame()">Back to DeutschSprint →</button>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

// ====================================================================
// READ SCENE FROM URL — ?scene=cafe|apartment|park
// ====================================================================
const sceneId = new URLSearchParams(location.search).get('scene') || 'cafe';

// ====================================================================
// SCENE DEFINITIONS
// ====================================================================

const SCENES = {
  // ============ A1.1 FOUNDATIONS CAPSTONE ============

    builder: buildFoundations,

      { id:'coins', german:'fünf Euro', english:'five euros', emoji:'💶', position:[-5, 1.05, 2], glb:null, fallback:makeCoins,

        question:{ prompt:'The teacher asks where you\'re from. They say:', answer:'Woher kommen Sie?', options:['Woher kommen Sie?','Wo wohnen Sie?','Wer sind Sie?','Wann kommen Sie?'] }},
      { id:'clock', german:'Wie spät ist es?', english:'What time is it?', emoji:'🕐', position:[5, 2.5, -7.85], glb:null, fallback:makeClock,

      { id:'table', german:'der Tisch', english:'table', emoji:'🪟', position:[5, 1.0, -3], glb:'assets/3d/furniture/table.glb', fallback:makeStandaloneTable,
        question:{ prompt:'How do you say "I have a table"?', answer:'Ich habe einen Tisch', options:['Ich habe einen Tisch','Ich bin ein Tisch','Ich habe ein Tisch','Ich Tisch habe'] }},

function makeFloor(color) {
  const geo = new THREE.PlaneGeometry(40, 40);
  const mat = new THREE.MeshStandardMaterial({ color, roughness:0.85 });
  const m = new THREE.Mesh(geo, mat);
  m.rotation.x = -Math.PI / 2;
  m.receiveShadow = true;
  return m;
}

function makeWall(w, h, color) {
  const geo = new THREE.BoxGeometry(w, h, 0.2);
  const mat = new THREE.MeshStandardMaterial({ color, roughness:0.9 });
  const m = new THREE.Mesh(geo, mat);
  m.castShadow = true;
  m.receiveShadow = true;
  return m;
}

function addRoomShell(floorColor, wallColor) {
  scene.add(makeFloor(floorColor));
  const N = makeWall(20, 4, wallColor); N.position.set(0, 2, -10); scene.add(N);
  const S = makeWall(20, 4, wallColor); S.position.set(0, 2, 10); scene.add(S);
  const E = makeWall(20, 4, wallColor); E.rotation.y = Math.PI/2; E.position.set(10, 2, 0); scene.add(E);
  const W = makeWall(20, 4, wallColor); W.rotation.y = Math.PI/2; W.position.set(-10, 2, 0); scene.add(W);
}

const keys = { w:0, a:0, s:0, d:0 };
const joystick = { active:false, x:0, y:0 };

document.addEventListener('keydown', (e) => {
  const k = e.key.toLowerCase();
  if (k === 'w' || k === 'arrowup') keys.w = 1;
  if (k === 'a' || k === 'arrowleft') keys.a = 1;
  if (k === 's' || k === 'arrowdown') keys.s = 1;
  if (k === 'd' || k === 'arrowright') keys.d = 1;
  if (k === 'e' || k === ' ') tryInteract();
});
document.addEventListener('keyup', (e) => {
  const k = e.key.toLowerCase();
  if (k === 'w' || k === 'arrowup') keys.w = 0;
  if (k === 'a' || k === 'arrowleft') keys.a = 0;
  if (k === 's' || k === 'arrowdown') keys.s = 0;
  if (k === 'd' || k === 'arrowright') keys.d = 0;
});

const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
const joystickZone = document.getElementById('joystickZone');
const joystickStick = document.getElementById('joystickStick');
const actionBtn = document.getElementById('actionBtn');

if (isTouch) {
  joystickZone.classList.add('show');
  actionBtn.classList.add('show');
}

let touchId = null;
let center = { x:95, y:window.innerHeight - 95 };

joystickZone.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const r = joystickZone.getBoundingClientRect();
  center = { x: r.left + r.width/2, y: r.top + r.height/2 };
  touchId = e.changedTouches[0].identifier;
  joystick.active = true;
  handleStick(e.changedTouches[0]);
}, { passive:false });

document.addEventListener('touchmove', (e) => {
  if (!joystick.active) return;
  for (const t of e.changedTouches) {
    if (t.identifier === touchId) { e.preventDefault(); handleStick(t); }
  }
}, { passive:false });

document.addEventListener('touchend', (e) => {
  for (const t of e.changedTouches) {
    if (t.identifier === touchId) {
      joystick.active = false; joystick.x = 0; joystick.y = 0; touchId = null;
      joystickStick.style.transform = 'translate(0,0)';
    }
  }
});

function handleStick(t) {
  const dx = t.clientX - center.x;
  const dy = t.clientY - center.y;
  const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
  const angle = Math.atan2(dy, dx);
  const px = Math.cos(angle) * dist;
  const py = Math.sin(angle) * dist;
  joystickStick.style.transform = `translate(${px}px,${py}px)`;
  joystick.x = px / 50; joystick.y = py / 50;
}

actionBtn.addEventListener('click', tryInteract);

function updatePlayer(dt) {
  let mx = 0, mz = 0;
  if (keys.w) mz -= 1;
  if (keys.s) mz += 1;
  if (keys.a) mx -= 1;
  if (keys.d) mx += 1;
  if (joystick.active) { mx = joystick.x; mz = joystick.y; }
  
  const len = Math.sqrt(mx*mx + mz*mz);
  if (len > 0) {
    mx /= len; mz /= len;
    playerState.isMoving = true;
    const targetAngle = Math.atan2(mx, mz) + Math.PI;
    let diff = targetAngle - playerState.facing;
    while (diff > Math.PI) diff -= Math.PI*2;
    while (diff < -Math.PI) diff += Math.PI*2;
    playerState.facing += diff * Math.min(1, dt * 10);
    player.rotation.y = playerState.facing;
    
    const newX = player.position.x + mx * 4.5 * dt;
    const newZ = player.position.z + mz * 4.5 * dt;
    
    // Boundaries: park has wider range
    const bound = sceneId === 'foundations' ? 9.5 : 9;
    if (Math.abs(newX) < bound) player.position.x = newX;
    if (Math.abs(newZ) < bound) player.position.z = newZ;
    
    player.position.y = Math.abs(Math.sin(performance.now() * 0.012)) * 0.05;
  } else {
    playerState.isMoving = false;
    player.position.y = 0;
  }
}

const gltfLoader = new GLTFLoader();
const fbxLoader = new FBXLoader();
const interactables = [];

// Smart loader: detects extension, uses right loader, normalizes scale and materials.
// Accepts a path with .glb extension as the "canonical" path, but will also try .fbx
// if the GLB doesn't exist. So you can drop EITHER format into /assets/ and it works.
async function load3DModel(path) {
  if (!path) return null;
  
  // Try the canonical path first, then fall back to FBX with same name
  const tries = [path];
  if (path.endsWith('.glb')) {
    tries.push(path.replace(/\.glb$/, '.fbx'));
  } else if (path.endsWith('.fbx')) {
    tries.push(path.replace(/\.fbx$/, '.glb'));
  }
  
  for (const candidate of tries) {
    const result = await loadOneModel(candidate);
    if (result) return result;
  }
  return null;
}

async function loadOneModel(path) {
  const ext = path.split('.').pop().toLowerCase();
  
  try {
    if (ext === 'glb' || ext === 'gltf') {
      const gltf = await new Promise((resolve, reject) => {
        gltfLoader.load(path, resolve, undefined, reject);
      });
      gltf.scene.traverse(o => {
        if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; }
      });
      return gltf.scene;
    }
    
    if (ext === 'fbx') {
      const fbx = await new Promise((resolve, reject) => {
        fbxLoader.load(path, resolve, undefined, reject);
      });
      
      // Quaternius FBX files are often exported at cm scale (100x larger than GLB).
      // Auto-normalize to a sensible target size.
      const box = new THREE.Box3().setFromObject(fbx);
      const size = box.getSize(new THREE.Vector3()).length();
      if (size > 5) {
        const targetSize = 0.5;
        const scale = targetSize / size;
        fbx.scale.setScalar(scale);
      }
      
      // FBX often loads materials as Lambert/Phong. Convert to Standard for proper PBR lighting.
      fbx.traverse(o => {
        if (o.isMesh) {
          o.castShadow = true;
          o.receiveShadow = true;
          
          if (o.material) {
            const mats = Array.isArray(o.material) ? o.material : [o.material];
            mats.forEach((mat, idx) => {
              if (mat.type !== 'MeshStandardMaterial' && mat.type !== 'MeshPhysicalMaterial') {
                const newMat = new THREE.MeshStandardMaterial({
                  color: mat.color || new THREE.Color(0xcccccc),
                  map: mat.map || null,
                  roughness: 0.7,
                  metalness: 0.0,
                  vertexColors: !!o.geometry?.attributes?.color
                });
                if (Array.isArray(o.material)) {
                  o.material[idx] = newMat;
                } else {
                  o.material = newMat;
                }
              } else {
                mat.roughness = mat.roughness ?? 0.7;
              }
            });
          }
        }
      });
      
      console.log(`✓ Loaded FBX: ${path} (size: ${size.toFixed(2)}, scaled: ${size > 5})`);
      return fbx;
    }
    
    return null;
    
  } catch (err) {
    // 404 or parse error — silent fail, the outer load3DModel will try the next format
    return null;
  }
}

async function loadObjects(onProgress) {
  const total = config.objects.length;
  let loaded = 0;
  
  for (const cfg of config.objects) {
    let mesh = null;
    
    // Try the configured 3D file (GLB or FBX) first
    if (cfg.glb) {
      mesh = await load3DModel(cfg.glb);
    }
    
    // Fall back to procedural geometry if no model loaded
    if (!mesh) {
      mesh = cfg.fallback();
    }
    
    mesh.position.set(...cfg.position);
    mesh.userData = { config: cfg };
    mesh.userData.bobOffset = Math.random() * Math.PI * 2;
    mesh.userData.baseY = cfg.position[1];
    
    // Glow ring on floor
    const glow = new THREE.Mesh(
      new THREE.CircleGeometry(0.5, 24),
      new THREE.MeshBasicMaterial({ color:0xff5c39, transparent:true, opacity:0, side:THREE.DoubleSide })
    );
    glow.rotation.x = -Math.PI / 2;
    glow.position.set(cfg.position[0], 0.02, cfg.position[2]);
    scene.add(glow);
    mesh.userData.glow = glow;
    
    scene.add(mesh);
    interactables.push(mesh);
    loaded++;
    onProgress(loaded / total);
  }
}

let nearestInteractable = null;

function updateInteractions() {
  let closest = null;
  let closestDist = 2.0;
  for (const obj of interactables) {
    if (obj.userData.completed) continue;
    const dx = obj.position.x - player.position.x;
    const dz = obj.position.z - player.position.z;
    const dist = Math.sqrt(dx*dx + dz*dz);
    if (dist < closestDist) { closest = obj; closestDist = dist; }
    
    const opacity = Math.max(0, 1 - dist / 3) * 0.4;
    if (obj.userData.glow) obj.userData.glow.material.opacity = opacity;
  }
  nearestInteractable = closest;
  
  const prompt = document.getElementById('interactPrompt');
  if (closest) {
    document.getElementById('interactText').textContent = `Examine ${closest.userData.config.emoji}`;
    if (!isTouch) prompt.classList.add('show');
    actionBtn.classList.remove('disabled');
  } else {
    prompt.classList.remove('show');
    actionBtn.classList.add('disabled');
  }
}

function tryInteract() {
  if (!nearestInteractable || nearestInteractable.userData.completed) return;
  showLesson(nearestInteractable);
}

// ====================================================================
// LESSON OVERLAY
// ====================================================================

let lessonAnswered = false;

function showLesson(obj) {
  const cfg = obj.userData.config;
  lessonAnswered = false;
  
  document.getElementById('lessonCard').innerHTML = `
    <div class="lesson-icon">${cfg.emoji}</div>
    <div class="lesson-de">${cfg.german}</div>
    <div class="lesson-en">${cfg.english}</div>
    <button class="lesson-listen" onclick="window._spk.speak('${cfg.german.replace(/'/g, "\\'")}')">🔊 Listen</button>
    <div class="lesson-question">${cfg.question.prompt}</div>
    <div class="lesson-options">
      ${cfg.question.options.map(opt => `<button class="lesson-option" data-opt="${escapeAttr(opt)}">${opt}</button>`).join('')}
    </div>
    <button class="lesson-close" id="lessonContinue" style="display:none;" onclick="window._spk.closeLesson()">Continue →</button>
  `;
  
  document.querySelectorAll('.lesson-option').forEach(btn => {
    btn.onclick = () => handleAnswer(btn, cfg, obj);
  });
  
  document.getElementById('lessonOverlay').classList.add('active');
  setTimeout(() => speak(cfg.german), 300);
}

function handleAnswer(btn, cfg, obj) {
  if (lessonAnswered) return;
  lessonAnswered = true;
  const correct = btn.dataset.opt === cfg.question.answer;
  
  document.querySelectorAll('.lesson-option').forEach(b => {
    b.style.pointerEvents = 'none';
    if (b.dataset.opt === cfg.question.answer) b.classList.add('correct');
    else if (b === btn) b.classList.add('incorrect');
  });
  
  if (correct) {
    obj.userData.completed = true;
    questState.found++;
    awardXP(10);
    obj.traverse(c => {
      if (c.isMesh && c.material) {
        c.material = c.material.clone();
        c.material.emissive = new THREE.Color(0xe8b931);
        c.material.emissiveIntensity = 0.4;
      }
    });
    if (obj.userData.glow) {
      obj.userData.glow.material.color.setHex(0xe8b931);
      obj.userData.glow.material.opacity = 0.5;
    }
    updateQuestUI();
  }
  document.getElementById('lessonContinue').style.display = 'block';
}

function closeLesson() {
  document.getElementById('lessonOverlay').classList.remove('active');
  if (questState.found >= questState.total) {
    setTimeout(() => {
      document.getElementById('completeSub').textContent = config.completeSub;
      document.getElementById('completeWords').textContent = questState.total;
      document.getElementById('questCompleteModal').classList.add('active');
      saveCompletion();
    }, 400);
  }
}

function escapeAttr(s) { return String(s).replace(/"/g,'&quot;').replace(/'/g,"&#39;"); }

// ====================================================================
// QUEST STATE & XP SYNC WITH SPRECHEN V4
// ====================================================================

const questState = { found:0, total:config.objects.length, xp:0 };

function updateQuestUI() {
  document.getElementById('questDone').textContent = questState.found;
  document.getElementById('questTotal').textContent = questState.total;
  const checks = document.getElementById('questChecks');
  checks.innerHTML = '';
  for (let i = 0; i < questState.total; i++) {
    const c = document.createElement('div');
    c.className = 'quest-check' + (i < questState.found ? ' done' : '');
    checks.appendChild(c);
  }
}

function awardXP(n) {
  questState.xp += n;
  document.getElementById('hudXP').textContent = questState.xp;
}

function saveCompletion() {
  try {
    const k = 'sprechen_v4';
    const s = JSON.parse(localStorage.getItem(k) || '{}');
    s.totalXP = (s.totalXP || 0) + 50;
    s.todayXP = (s.todayXP || 0) + 50;
    s.weekHistory = s.weekHistory || {};
    const today = new Date().toISOString().slice(0, 10);
    s.weekHistory[today] = (s.weekHistory[today] || 0) + 50;
    s.completedScenes3D = s.completedScenes3D || [];
    if (!s.completedScenes3D.includes(sceneId)) s.completedScenes3D.push(sceneId);
    localStorage.setItem(k, JSON.stringify(s));
  } catch(e) {}
}

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'de-DE'; u.rate = 0.85;
  speechSynthesis.speak(u);
}

function quitGame() {
  // Save partial XP
  try {
    const k = 'sprechen_v4';
    const s = JSON.parse(localStorage.getItem(k) || '{}');
    if (questState.xp > 0) {
      s.totalXP = (s.totalXP || 0) + questState.xp;
      s.todayXP = (s.todayXP || 0) + questState.xp;
      s.weekHistory = s.weekHistory || {};
      const today = new Date().toISOString().slice(0, 10);
      s.weekHistory[today] = (s.weekHistory[today] || 0) + questState.xp;
      localStorage.setItem(k, JSON.stringify(s));
    }
  } catch(e) {}
  
  // Try to go back to Sprechen
  if (window.opener && !window.opener.closed) {
    window.close();
  } else if (history.length > 1) {
    history.back();
  } else {
    document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;color:white;font-family:Inter,sans-serif;text-align:center;padding:20px;"><div style="font-family:Fraunces,serif;font-size:32px;font-weight:800;margin-bottom:8px;">Tschüss!</div><div style="opacity:0.6;">Earned ${questState.xp} XP. You can close this tab.</div></div>`;
  }
}

window._spk = { speak, closeLesson, quitGame };
window.quitGame = quitGame;

// ====================================================================
// RENDER LOOP
// ====================================================================

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);
  const t = clock.getElapsedTime();
  
  updatePlayer(dt);
  updateCamera(dt);
  updateInteractions();
  
  for (const obj of interactables) {
    if (obj.userData.completed) continue;
    obj.position.y = obj.userData.baseY + Math.sin(t * 1.5 + obj.userData.bobOffset) * 0.05;
    obj.rotation.y = t * 0.4;
  }
  
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ====================================================================
// INIT
// ====================================================================

async function init() {
  document.getElementById('sceneTitle').textContent = config.name;
  document.getElementById('questText').textContent = config.questText;
  document.getElementById('questCard').style.display = 'block';
  document.getElementById('loadingSub').textContent = `Loading ${config.name}...`;
  
  const bar = document.getElementById('loadingBar');
  const status = document.getElementById('loadingStatus');
  
  status.textContent = 'Building scene...';
  bar.style.width = '20%';
  await new Promise(r => setTimeout(r, 100));
  config.builder();
  
  status.textContent = 'Loading models...';
  bar.style.width = '40%';
  await loadObjects(p => bar.style.width = (40 + p * 50) + '%');
  
  status.textContent = 'Ready!';
  bar.style.width = '100%';
  await new Promise(r => setTimeout(r, 300));
  document.getElementById('loading').classList.add('hidden');
  
  updateQuestUI();
  
  setTimeout(() => {
    const hint = document.getElementById('hintBanner');
    hint.textContent = isTouch ? 'Joystick to move · tap E to examine' : 'WASD to move · E to examine';
    hint.classList.add('show');
    setTimeout(() => hint.classList.remove('show'), 4000);
  }, 800);
  
  animate();
}

init().catch(err => {
  console.error('Init failed:', err);
  document.getElementById('loadingStatus').textContent = 'Error. Check console.';
});
</script>
